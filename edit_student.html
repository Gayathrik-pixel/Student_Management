<!DOCTYPE html>
<html>
<head><title>Edit Student</title>
    <style>
        button{
                background-color: white;
    border-radius: 5px;
    color: blue;
        }
    </style>
</head>
<body>
<h2><u>Edit Student</u></h2>
<form method="POST">
Name: <input type="text" name="name" value="{{student[1]}}" required><br><br>
Age: <input type="number" name="age" value="{{student[2]}}" required><br><br>
Department: <input type="text" name="department" value="{{student[3]}}" required><br><br>
<button type="submit">Update</button>
</form>
</body>
</html>
