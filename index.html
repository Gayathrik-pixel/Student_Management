<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>
<body>
<h1><u>Student List</u></h1>

<table>
<tr>
<th>ID</th><th>Name</th><th>Age</th><th>Department</th><th>Action</th>
</tr>
{% for s in students %}
<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td>
<a href="/edit/{{s[0]}}">Edit</a> |
<a href="/delete/{{s[0]}}">Delete</a>
</td>
</tr>
{% endfor %}
</table>
<h2></h2>

<button><a href="/add">Add Student</a></button>
</body>
</html>
